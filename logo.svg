    <circle cx="38" cy="60" r="14" fill="url(#mLogo)"/>
    <rect x="50" y="10" width="5" height="52" rx="2.5" fill="url(#mLogo)"/>
    <path d="M55 10 C70 14, 78 24, 70 36 C66 42, 58 42, 55 38 Z" fill="url(#mLogo)" opacity="0.85"/>
  </g>

  <!-- Wordmark -->
  <text x="98" y="62"
